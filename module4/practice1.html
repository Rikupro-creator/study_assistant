<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Multitenant Architecture - 15 MCQ Test with Real-Life Examples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 35px;
        }
        h1 {
            text-align: center;
            color: #2C3E50;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .subtitle {
            text-align: center;
            color: #34495E;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 1.2em;
            background: #F0F8FF;
            padding: 15px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .real-life-badge {
            background: linear-gradient(135deg, #FFD166, #FF9F1C);
            color: #2C3E50;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
            margin-left: 15px;
            vertical-align: middle;
        }
        .question-card {
            background: #FFFFFF;
            border: 2px solid #E0E0E0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .question-card::before {
            content: "🏢";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 60px;
            opacity: 0.1;
            transform: rotate(15deg);
        }
        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
            border-color: #4ECDC4;
        }
        .question-number {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            color: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(255,107,107,0.3);
        }
        .question-text {
            font-size: 1.2em;
            font-weight: 600;
            color: #2C3E50;
            margin-bottom: 20px;
            line-height: 1.6;
            padding-right: 20px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }
        .option:hover {
            background: linear-gradient(135deg, #FFF5F5, #F0FDF9);
            border-color: #4ECDC4;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(78,205,196,0.2);
        }
        .option input[type="radio"] {
            margin-right: 20px;
            accent-color: #4ECDC4;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .option-text {
            font-size: 1.05em;
            color: #2D3748;
            flex: 1;
        }
        .example-box {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #FF6B6B;
            font-size: 0.95em;
            color: #4A5568;
            display: none;
        }
        .example-box.show {
            display: block;
        }
        .example-icon {
            font-size: 1.2em;
            margin-right: 8px;
        }
        .explanation {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #F0F9FF, #E6FFFA);
            border-radius: 12px;
            border-left: 6px solid #4ECDC4;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .explanation.show {
            display: block;
        }
        .correct-badge {
            background: #10B981;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .incorrect-badge {
            background: #EF4444;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .reason-text {
            color: #1E293B;
            line-height: 1.7;
            font-size: 1.05em;
        }
        .reason-text strong {
            color: #0F766E;
        }
        .real-life-section {
            background: #FFF8E7;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px dashed #FF9F1C;
        }
        .real-life-title {
            color: #B45309;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 45px;
            font-size: 1.2em;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            color: white;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,107,107,0.4);
        }
        .btn-secondary {
            background: white;
            color: #2C3E50;
            border: 2px solid #4ECDC4;
        }
        .btn-secondary:hover {
            background: #F0FDF9;
            transform: translateY(-3px);
        }
        .score-card {
            text-align: center;
            font-size: 1.5em;
            padding: 20px;
            background: linear-gradient(135deg, #2C3E50, #3498DB);
            color: white;
            border-radius: 60px;
            margin: 20px 0;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #E2E8F0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #4ECDC4);
            width: 0%;
            transition: width 0.5s;
        }
        .footer {
            text-align: center;
            color: #64748B;
            margin-top: 30px;
            font-size: 1em;
        }
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ Oracle Multitenant Architecture</h1>
        <div class="subtitle">
            Master Container Databases (CDB) and Pluggable Databases (PDB) with Real-World Scenarios
            <span class="real-life-badge">Real Examples Included</span>
        </div>
        
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        
        <div id="questions-container"></div>
        
        <div class="button-container">
            <button class="btn btn-primary" onclick="submitAnswers()">📊 Submit & See Explanations</button>
            <button class="btn btn-secondary" onclick="resetQuiz()">🔄 Reset Quiz</button>
        </div>
        
        <div id="score-card" class="score-card"></div>
        <div class="footer">Click Submit to reveal detailed explanations with real-life analogies and use cases</div>
    </div>

    <script>
        const questions = [
            {
                question: "What is a Container Database (CDB) in Oracle Multitenant architecture?",
                options: [
                    "A database that contains only user data",
                    "A master database that can host multiple pluggable databases",
                    "A database used only for backup purposes",
                    "A lightweight database without system tablespaces"
                ],
                correct: 1,
                explanation: "✅ <strong>CDB is correct</strong> - It's the master container that holds multiple Pluggable Databases (PDBs). Think of it as an apartment building that contains multiple apartment units.",
                realExample: "🏢 <strong>Real Company Example:</strong> A large bank runs separate databases for Retail Banking, Corporate Banking, and Wealth Management. Instead of having three separate Oracle installations, they use one CDB containing three PDBs - one for each division. This reduces management overhead by 40% and makes backup/DR much simpler."
            },
            {
                question: "What is a Pluggable Database (PDB)?",
                options: [
                    "A portable collection of schemas and objects that appears as a separate database to applications",
                    "A special tablespace for temporary data",
                    "A backup copy of the root container",
                    "A memory structure in the SGA"
                ],
                correct: 0,
                explanation: "✅ <strong>PDB is correct</strong> - A PDB is a portable collection of schemas, objects, and data that appears as a separate database to applications and users.",
                realExample: "💼 <strong>SaaS Provider Example:</strong> A cloud company like Salesforce hosts 100 different companies' data. Using Multitenant, they create 100 PDBs in one CDB - each PDB is isolated, secure, and appears as its own database to each client. This saves massive resources compared to running 100 separate databases."
            },
            {
                question: "What is the ROOT container in a CDB?",
                options: [
                    "The location where all user data is stored",
                    "A container that holds system metadata and Oracle-supplied objects",
                    "The default PDB for user connections",
                    "A backup container for disaster recovery"
                ],
                correct: 1,
                explanation: "✅ <strong>ROOT is correct</strong> - The root container (CDB$ROOT) stores system metadata, Oracle-supplied objects, and common users.",
                realExample: "🏦 <strong>Banking Analogy:</strong> Think of the ROOT as the building management office in an apartment complex. It keeps track of all apartments (PDBs), maintains the building's central systems (like plumbing/electricity - Oracle metadata), and manages common areas. Each apartment resident (application) only sees their own unit, not the management office."
            },
            {
                question: "Which of the following is TRUE about PDB isolation?",
                options: [
                    "PDBs can access each other's data without restrictions",
                    "PDBs are completely isolated - one PDB cannot access another PDB's data",
                    "PDBs share all tablespaces with each other",
                    "PDBs must have the same character set as each other"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - PDBs provide strong isolation. Data from one PDB cannot be accessed by another PDB unless database links are explicitly created.",
                realExample: "🏥 <strong>Healthcare Example:</strong> A hospital system uses separate PDBs for Patient Records, Billing, and Research. The Patient Records PDB contains sensitive HIPAA data that must be completely isolated from Research PDB. Even if a hacker breaches the Billing PDB, they cannot access Patient Records data due to PDB isolation."
            },
            {
                question: "What happens when you 'unplug' a PDB?",
                options: [
                    "The PDB is permanently deleted",
                    "The PDB is disassociated from the CDB but its data files remain",
                    "The entire CDB shuts down",
                    "All other PDBs are automatically backed up"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - Unplugging disconnects a PDB from its CDB but preserves its data files in an XML metadata file for later plugging into another CDB.",
                realExample: "🏢 <strong>Merger & Acquisition Scenario:</strong> Company A acquires Company B. Company B's HR database (PDB) needs to move to Company A's environment. The DBA unplugs the HR PDB from Company B's CDB, transfers the files, and plugs it into Company A's CDB. The move takes 30 minutes instead of 3 days for a traditional migration."
            },
            {
                question: "What is a common user in Multitenant architecture?",
                options: [
                    "A user that exists only in one PDB",
                    "A user that can only connect to the ROOT",
                    "A user that exists in the ROOT and can be granted access to multiple PDBs",
                    "A user with no administrative privileges"
                ],
                correct: 2,
                explanation: "✅ <strong>Option C is correct</strong> - Common users (prefixed with C##) exist in the ROOT and can connect to multiple PDBs with appropriate privileges.",
                realExample: "👨‍💼 <strong>IT Department Example:</strong> A DBA team manages 50 PDBs for different departments. Instead of creating 50 separate DBA accounts, they create one common user 'C##DBA_TEAM' in the ROOT and grant it privileges to all PDBs. When a team member leaves, they disable just one account instead of updating 50 databases."
            },
            {
                question: "What is a local user in a PDB?",
                options: [
                    "A user that exists only in a specific PDB",
                    "A user that can access all PDBs",
                    "A user that can only connect to the ROOT",
                    "A user with SYSDBA privileges only"
                ],
                correct: 0,
                explanation: "✅ <strong>Option A is correct</strong> - Local users are created within a specific PDB and only exist in that PDB.",
                realExample: "🎨 <strong>Creative Agency Example:</strong> Agency uses one PDB per client. For Client A's PDB, they create local users 'design_team' and 'content_writers' who can only access Client A's data. Even if these credentials are compromised, the attacker cannot access Client B's PDB."
            },
            {
                question: "Which statement about PDB cloning is TRUE?",
                options: [
                    "PDBs cannot be cloned",
                    "Cloning creates an exact copy that can be used for development or testing",
                    "Only the ROOT can be cloned",
                    "Cloning requires shutting down the source PDB"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - PDB cloning creates an exact copy quickly and efficiently, perfect for development and testing.",
                realExample: "🚀 <strong>DevOps Example:</strong> A fintech company needs to create 20 development environments from production data. Using Multitenant's snapshot cloning, they create 20 PDB clones of production in 5 minutes using storage snapshots. Traditional methods would require 20 separate copies taking 4+ hours each."
            },
            {
                question: "What is the purpose of the PDB$SEED container?",
                options: [
                    "To store backup copies of all PDBs",
                    "A template used to create new PDBs",
                    "To store seed data for applications",
                    "A special container for archived logs"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - PDB$SEED is a template PDB used to quickly create new PDBs.",
                realExample: "🏗️ <strong>Construction Analogy:</strong> Like a home builder using a model home design to create multiple similar houses. A SaaS company uses PDB$SEED containing base application schemas to spin up new customer databases in seconds with the same structure every time."
            },
            {
                question: "What is a 'hot clone' operation in Multitenant?",
                options: [
                    "A clone created while the source PDB remains online",
                    "A clone that requires database shutdown",
                    "A clone stored in a different data center",
                    "A clone that consumes no storage"
                ],
                correct: 0,
                explanation: "✅ <strong>Option A is correct</strong> - Hot cloning creates PDB copies without downtime, keeping the source fully accessible.",
                realExample: "⚡ <strong>E-commerce Example:</strong> An online retailer needs a test copy of their production PDB during Black Friday sales. They perform a hot clone while production handles thousands of transactions - zero downtime, zero performance impact, and they get an exact replica for testing."
            },
            {
                question: "What is a 'refreshable clone' PDB?",
                options: [
                    "A PDB that automatically refreshes its own data",
                    "A PDB that can be periodically synchronized with its source",
                    "A PDB that cannot be modified",
                    "A PDB that refreshes every minute"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - Refreshable clones can be periodically synced with source PDBs, ideal for reporting and testing.",
                realExample: "📊 <strong>Reporting Example:</strong> A bank needs near-real-time reporting without impacting production. They create a refreshable clone of the production PDB that refreshes every hour. Reporting queries run on the clone, saving production resources while providing fresh data for analytics."
            },
            {
                question: "What happens to PDBs when the CDB instance is stopped?",
                options: [
                    "All PDBs remain open",
                    "All PDBs are automatically closed",
                    "Only the ROOT closes, PDBs stay open",
                    "PDBs can still accept connections"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - When CDB stops, all PDBs close because they depend on the CDB instance.",
                realExample: "🏢 <strong>Office Building Analogy:</strong> If the building's main power (CDB) goes out, all offices (PDBs) lose power too. No individual office can function without the building's infrastructure. This is why PDBs cannot operate independently of their CDB."
            },
            {
                question: "What is PDB snapshot carousel?",
                features: [
                    "A theme park ride for DBAs",
                    "A feature for creating and managing multiple PDB snapshots over time",
                    "A backup rotation tool",
                    "A PDB monitoring feature"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - PDB snapshot carousel allows automated creation and management of PDB snapshots at different points in time.",
                realExample: "⏰ <strong>Time Travel Example:</strong> A law firm needs to maintain daily snapshots of client PDBs for compliance. They configure snapshot carousel to keep 30 days of snapshots. When a lawyer needs data from 3 weeks ago, they can instantly restore a PDB snapshot from that exact day."
            },
            {
                question: "Which of the following is NOT a benefit of Multitenant architecture?",
                options: [
                    "Simplified patching and upgrades",
                    "Better resource utilization",
                    "Each PDB requires its own background processes",
                    "Faster provisioning of new databases"
                ],
                correct: 2,
                explanation: "✅ <strong>Option C is NOT a benefit</strong> - PDBs share background processes, they don't require their own.",
                realExample: "💰 <strong>Cost Savings Example:</strong> Before Multitenant, a hosting company ran 100 VMs for 100 customer databases (each with its own processes). With Multitenant, they run 1 CDB with 100 PDBs, sharing processes and memory. This reduced their cloud costs by 60% and simplified management."
            },
            {
                question: "What is the purpose of 'application containers' in Multitenant?",
                options: [
                    "To run application servers",
                    "To manage a set of PDBs that share common application definitions",
                    "To store application binaries",
                    "To isolate web applications"
                ],
                correct: 1,
                explanation: "✅ <strong>Option B is correct</strong> - Application containers allow managing multiple PDBs that share the same application definition as a single unit.",
                realExample: "📱 <strong>Microservices Example:</strong> A streaming service like Netflix uses an application container for their 'User Management' application. This container holds 50 PDBs (one per microservice instance) that all share the same user management schema. When they update the schema, they patch the application container once, and all 50 PDBs are automatically updated."
            }
        ];

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            let html = '';
            
            questions.forEach((q, index) => {
                html += `
                    <div class="question-card" id="q-${index}">
                        <div class="question-number">Question ${index + 1} of 15</div>
                        <div class="question-text">${q.question}</div>
                        <div class="options">
                            ${q.options.map((opt, optIndex) => `
                                <label class="option">
                                    <input type="radio" name="q${index}" value="${optIndex}">
                                    <span class="option-text">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div id="exp-${index}" class="explanation"></div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function submitAnswers() {
            let score = 0;
            let answered = 0;
            
            document.querySelectorAll('.explanation').forEach(exp => {
                exp.classList.remove('show');
                exp.innerHTML = '';
            });
            
            questions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const explanationDiv = document.getElementById(`exp-${index}`);
                
                if (selected) {
                    answered++;
                    const selectedValue = parseInt(selected.value);
                    
                    if (selectedValue === q.correct) {
                        score++;
                    }
                    
                    const selectedText = q.options[selectedValue];
                    const correctText = q.options[q.correct];
                    
                    let explanationHTML = `
                        <div class="${selectedValue === q.correct ? 'correct-badge' : 'incorrect-badge'}">
                            ${selectedValue === q.correct ? '✓ CORRECT' : '✗ INCORRECT'}
                        </div>
                        <div class="reason-text">
                            <strong>Your answer:</strong> ${selectedText}<br>
                            <strong>Correct answer:</strong> ${correctText}<br><br>
                            ${q.explanation}
                        </div>
                        <div class="real-life-section">
                            <div class="real-life-title">🌟 Real-World Example:</div>
                            ${q.realExample}
                        </div>
                    `;
                    
                    explanationDiv.innerHTML = explanationHTML;
                    explanationDiv.classList.add('show');
                } else {
                    explanationDiv.innerHTML = `
                        <div class="incorrect-badge">⚠️ NOT ANSWERED</div>
                        <div class="reason-text">
                            <strong>Correct answer:</strong> ${q.options[q.correct]}<br><br>
                            ${q.explanation}
                        </div>
                        <div class="real-life-section">
                            <div class="real-life-title">🌟 Real-World Example:</div>
                            ${q.realExample}
                        </div>
                    `;
                    explanationDiv.classList.add('show');
                }
            });
            
            const percentage = Math.round(score/15*100);
            const scoreCard = document.getElementById('score-card');
            scoreCard.style.display = 'block';
            scoreCard.innerHTML = `📊 Score: ${score}/15 (${percentage}%) - ${answered} questions answered`;
            
            document.getElementById('progress-fill').style.width = percentage + '%';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetQuiz() {
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.checked = false;
            });
            
            document.querySelectorAll('.explanation').forEach(exp => {
                exp.classList.remove('show');
                exp.innerHTML = '';
            });
            
            document.getElementById('score-card').style.display = 'none';
            document.getElementById('progress-fill').style.width = '0%';
        }

        window.onload = renderQuestions;
    </script>
</body>
</html>
